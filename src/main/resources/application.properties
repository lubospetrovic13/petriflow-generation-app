#
#  Petriflow Unified Backend ? configuration
#  API keys and secrets are managed via the Settings panel in the UI.
#  This file contains only structural/non-secret defaults.
#

#  LLM Provider (default shown ? user can override in UI)
llm.provider=claude

#  Context mode: full | rag
context.mode=full

#  Embedding provider (used when context.mode=rag): openai | gemini
embed.provider=gemini

#  API keys ? leave blank here; set them via the ? Settings panel in the UI
anthropic.api-key=
openai.api-key=
gemini.api-key=

#  Model defaults (overridable via Settings panel)
claude.model=claude-sonnet-4-6
openai.model=gpt-4.1
gemini.model=gemini-2.5-flash

#  Max output tokens
claude.max-output-tokens=32000
openai.max-output-tokens=16000
gemini.max-output-tokens=65536

#  Gemini thinking (0=off, -1=auto, >0=budget)
gemini.thinking-budget=0

#  Claude extended thinking
claude.thinking.enabled=false
claude.thinking.budget=4000

#  RAG tuning
rag.top-k=14
rag.always-include=7.,8.,9.

#  Server
server.port=8080
cors.allowed-origins=*
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000

#  Run log
run.log.path=run-log.jsonl

#  Chat history storage
chat.storage.path=chats.json

#  Settings storage (API keys, GitHub config, model overrides)
settings.storage.path=settings.json

#  GitHub file upload (set via Settings panel ? leave blank here)
github.token=
github.username=
github.repo=

#  eTask credentials (set via Settings panel)
etask.email=
etask.password=

#  Ollama (local LLM)
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.max-output-tokens=8192