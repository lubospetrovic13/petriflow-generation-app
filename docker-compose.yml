services:
  petriflow-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CHAT_STORAGE_PATH=/app/chats.json
      - SETTINGS_STORAGE_PATH=/app/settings.json
    volumes:
      - ./chats.json:/app/chats.json
      - ./settings.json:/app/settings.json
      - ./data:/app/data
    restart: unless-stopped